<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Results summary component</title>

  <link rel="stylesheet" href="index.css">

  
  
</head>
<body>

  <main>
    <div class="results-summary">
      <div class="result-card">
        <div class="result-score">
          <h1>Your Result</h1>
          <div class="score-circle">
            <div class="marks-obtained">76</div>
            <div class="total-marks">of 100</div>
          </div>
          <div class="result-title">Great</div>
          <div class="result-description">You scored higher than 65% of the people who have taken these tests.</div>
        </div>
        
        <div class="summary">
          <h1 class="summary-title">Summary</h1>

          <div class="summary-item-reaction">
            <div class="item-left">
              <img src="assets/images/icon-reaction.svg" alt="Reaction icon">
              <span class="reac_title">Reaction</span>
            </div>
            <div class="item-score">
              <strong>80</strong> / <span class="total-score">100</span>
            </div>
          </div>

          <div class="summary-item-memory">
            <div class="item-left">
              <img src="assets/images/icon-memory.svg" alt="Memory icon">
              <span>Memory</span>
            </div>
            <div class="item-score">
              <strong>92</strong> / <span class="total-score">100</span>
            </div>
          </div>

          <div class="summary-item-verbal">
            <div class="item-left">
              <img src="assets/images/icon-verbal.svg" alt="Verbal icon">
              <span>Verbal</span>
            </div>
            <div class="item-score">
              <strong>61</strong> / <span class="total-score">100</span>
            </div>
          </div>

          <div class="summary-item-visual">
            <div class="item-left">
              <img src="assets/images/icon-visual.svg" alt="Visual icon">
              <span>Visual</span>
            </div>
            <div class="item-score">
              <strong>72</strong> / <span class="total-score">100</span>
            </div>
          </div>

          <div class="continue-button">Continue</div>
        </div>
    </div>
  </main>

  <footer>
    <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Shubhangi Mishra</a>.
  </div>
  </footer>

</body>
</html>
